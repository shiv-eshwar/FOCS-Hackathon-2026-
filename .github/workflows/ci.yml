name: VaultShield Security Gate

on:
  push:
    branches:
      - main
      - vulnerable
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t vaultshield-app:${GITHUB_SHA} .

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Scanner deps
        run: |
          python -m pip install --upgrade pip
          pip install rich jinja2 pyyaml

      - name: Run VaultShield Scanner
        run: |
          POLICY_FILE="policies/default.yaml"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            POLICY_FILE="policies/main-demo.yaml"
          fi
          python main.py \
            --image vaultshield-app:${GITHUB_SHA} \
            --output both \
            --reports-dir reports \
            --fail-on critical \
            --policy ${POLICY_FILE} \
            --project "VaultShield Demo App" \
            --branch ${GITHUB_REF_NAME}

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.ref_name }}
          path: reports/

      - name: Security Gate Passed
        if: success()
        run: echo "✅ SECURITY GATE PASSED - Safe to deploy"

      - name: Security Gate Blocked
        if: failure()
        run: echo "❌ SECURITY GATE BLOCKED - Critical vulnerabilities found"

  deploy-simulation:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref_name == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Deployable Image
        run: docker build -t vaultshield-app:${GITHUB_SHA} .

      - name: Simulate Production Deploy
        run: |
          echo "🚀 Deploying VaultShield to production..."
          docker run -d -p 8080:80 --name vaultshield-demo vaultshield-app:${GITHUB_SHA}
          echo "✅ Live at http://localhost:8080"

      - name: Verify deployment health
        run: |
          sleep 3
          curl -f http://localhost:8080
          echo "Health check passed"

  publish-pages:
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref_name == 'main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload landing page artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
